<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirQo Pollution Visualization</title>
  </head>
  <body class="m-0 p-0 overflow-hidden bg-gray-900 text-white">
    <div id="app" class="relative w-screen h-screen">
      <div id="map" class="absolute inset-0"></div>
      
      <!-- Overlay UI -->
      <div class="absolute top-4 left-4 right-4 md:right-auto md:w-96 bg-gray-900/80 backdrop-blur border border-gray-700 rounded-lg p-6 shadow-2xl z-10 flex flex-col gap-4">
        <h1 class="text-2xl font-semibold tracking-tight">Air Quality in Kampala</h1>
        <p class="text-sm text-gray-400">
          Visualizing real-time PM2.5 measurements from the AirQo API.
        </p>

        <div class="flex flex-col gap-2">
          <label class="text-xs font-medium text-gray-400 uppercase tracking-wider">Visualization Mode</label>
          <div class="flex rounded-md overflow-hidden bg-gray-800 p-1">
            <button id="mode-markers" class="flex-1 py-1.5 px-3 text-sm rounded transition-colors bg-blue-600 text-white font-medium">Markers</button>
            <button id="mode-heatmap" class="flex-1 py-1.5 px-3 text-sm rounded transition-colors text-gray-400 hover:text-white hover:bg-gray-700 font-medium">Heatmap</button>
          </div>
        </div>

        <div id="loading-indicator" class="hidden text-sm text-blue-400 animate-pulse">
          Fetching AirQo data...
        </div>

        <div id="error-message" class="hidden text-sm text-red-400 bg-red-950/50 p-3 rounded-md border border-red-900/50">
        </div>

        <div id="stats" class="grid grid-cols-2 gap-4 mt-2">
          <div class="bg-gray-800 p-3 rounded-md border border-gray-700 text-center">
            <div class="text-xs text-gray-500 uppercase">Stations</div>
            <div id="stat-count" class="text-xl font-mono text-white mt-1">--</div>
          </div>
          <div class="bg-gray-800 p-3 rounded-md border border-gray-700 text-center">
            <div class="text-xs text-gray-500 uppercase">Avg PM2.5</div>
            <div id="stat-avg" class="text-xl font-mono text-white mt-1">--</div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
